name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build shared package
        run: npm run build:shared

      - name: Run tests
        run: npm run test -w packages/api

      - name: Build API
        run: npm run build:api

      - name: Build frontend
        run: npm run build:web

      - name: Deploy to server
        uses: easingthemes/ssh-deploy@v5
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
          REMOTE_USER: ${{ secrets.REMOTE_USER }}
          SOURCE: "packages/api/dist/ packages/api/prisma/ packages/api/package.json packages/web/dist/ packages/shared/dist/ packages/shared/package.json package.json package-lock.json"
          TARGET: ${{ secrets.REMOTE_PATH }}

      - name: Post-deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ${{ secrets.REMOTE_PATH }}
            npm ci --omit=dev --workspaces
            cd packages/api
            npx prisma migrate deploy
            pm2 restart resa-api || pm2 start dist/server.js --name resa-api
